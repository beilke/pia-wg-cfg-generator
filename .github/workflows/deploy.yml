name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

env:
  DOCKER_HUB_USERNAME: fbeilke
  IMAGE: pia-wg-generator

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tags
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE }}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE }}:dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-dockhand:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Dockhand Webhook
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            WEBHOOK_URL="${{ secrets.DOCKHAND_DEV_WEBHOOK }}"
            WEBHOOK_SECRET="${{ secrets.DOCKHAND_DEV_WEBHOOK_SECRET }}"
            echo "Triggering dev stack deployment..."
          else
            WEBHOOK_URL="${{ secrets.DOCKHAND_PROD_WEBHOOK }}"
            WEBHOOK_SECRET="${{ secrets.DOCKHAND_PROD_WEBHOOK_SECRET }}"
            echo "Triggering production stack deployment..."
          fi

          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $WEBHOOK_SECRET" \
            --max-time 30 || true

          echo "✓ Webhook triggered successfully!"
