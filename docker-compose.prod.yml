# Vault-integrated version
# Stack: pia
# Deploy with:
#   docker compose -f pia-vault.yaml --env-file .env up -d

networks:
  vault-network:
    external: true
    name: vault-network

services:
  pia-wg-generator:
    container_name: pia-wg-generator
    image: fbeilke/pia-wg-generator:latest
    restart: unless-stopped
    networks:
      - vault-network
    env_file:
      - /shared-configs/env/pia.env
    # No need for command override - the entrypoint handles Vault
    environment:
      VAULT_ADDR: "${VAULT_ADDR}"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      CONFIG_DIR: "/configs"
      DEBUG: "0"
      # Credentials come from Vault:
      #   PIA_USER / PIA_PASS     <- secret/data/pia/general (pia_user / pia_pass)
      #   UNIFI_USER / UNIFI_PASS <- secret/data/mcp-infrastructure/unifi (username / password)
      # Without Vault, set them directly instead:
      #   PIA_USER: "p1234567"
      #   PIA_PASS: "your-pia-password"
      #   UNIFI_USER: "unifi-local-admin"
      #   UNIFI_PASS: "your-unifi-password"
      REGIONS: "br,nl_amsterdam,no,sweden,uk,de_germany-so,belgium"
      UPDATE_INTERVAL: "0 */12 * * *"
      PIA_SERVER_LIST_URL: "https://serverlist.piaservers.net/vpninfo/servers/v6"
      PUSH_TO_UNIFI: "1"
      UNIFI_URL: "https://192.168.1.1"
      UNIFI_SITE: "default"
      UNIFI_REGION_MAP: "br=PIA-VPN-Brazil,nl_amsterdam=PIA-VPN-Netherlands,no=PIA-VPN-Norway,sweden=PIA-VPN-Stockholm,uk=PIA-VPN-London,de_germany-so=PIA-VPN-Germany,belgium=PIA-VPN-Belgium"
    volumes:
      - /mnt/storage/configs/docker-stacks/vault-shared/scripts:/vault-shared/scripts:ro
      - /mnt/storage/downloads/pia-wireguard:/configs
      - /mnt/storage/configs/pia-wireguard/logs:/logs
